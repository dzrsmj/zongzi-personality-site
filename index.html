<style>

// 3道题 — 每题权重递增(1/2/4)，保证任意答案组合总分唯一，数学上消除平局
const QUESTIONS = [
  {
    id: 'q1',
    weight: 1,
    label: '第 1 / 3 题 · 口味偏好',
    title: '粽子端上来，你第一口想吃到什么？',
    options: [
      { emoji: '🥩', text: '咸口的，有肉才叫粽子', scores: { xianrou: 1 } },
      { emoji: '🫘', text: '甜口的，豆沙蜜枣才是正道', scores: { dousha: 1 } },
      { emoji: '🍚', text: '原味白米，蘸什么再说', scores: { baimi: 1 } },
      { emoji: '🫧', text: '猎奇口味，榴莲冰粽来一个', scores: { liulian: 1 } },
    ],
  },
  {
    id: 'q2',
    weight: 2,
    label: '第 2 / 3 题 · 社交场景',
    title: '朋友聚会，你通常是哪个角色？',
    options: [
      { emoji: '📋', text: '组织者，时间地点都安排好了', scores: { babao: 2 } },
      { emoji: '😂', text: '气氛组，段子不停全场爆笑', scores: { mizao: 2 } },
      { emoji: '☺️', text: '安静陪伴，听大家聊天就很开心', scores: { dousha: 2 } },
      { emoji: '💡', text: '灵魂人物，话题经常从我这里拐弯', scores: { huitang: 2 } },
    ],
  },
  {
    id: 'q3',
    weight: 4,
    label: '第 3 / 3 题 · 假期态度',
    title: '假期最后一天，你一般在干嘛？',
    options: [
      { emoji: '📝', text: '收尾整理，把该做的事做完', scores: { xianrou: 4 } },
      { emoji: '🍻', text: '约最后一顿，吃到尽兴才结束', scores: { danhuang: 4 } },
      { emoji: '🛋️', text: '躺平刷手机，假期就是用来浪费的', scores: { baimi: 4 } },
      { emoji: '🚗', text: '临时起意，去个没去过的地方', scores: { liulian: 4 } },
    ],
  },
];

// 状态
let currentQ = 0;
let scores = {};
let selectedZongzi = null;
let isAnswering = false; // 防双击

// 预加载二维码
const qrImage = new Image();
qrImage.src = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAMgAAADIAQMAAACXljzdAAAABlBMVEX///8AAABVwtN+AAAACXBIWXMAAA7EAAAOxAGVKw4bAAABjklEQVRYhdWXMbKDMAxExVBQ+ggcxTf79tE4io9ASeFBf1fyD/mZSY1wkUl4FJG1Wq9Fvq6iXCLLnlVmfp/syRmA/NgfnPqy86Vj3WTqfBScoIZW+D3Xk5869aRan0Cw8+gCVsv1OUTmA70w7TyDuHb0wE/tS5NPVd1IfBqpayhkhq7L/zmNScbCLm/i6v6wuZCE9TS6R9qstE3OeUdVsQmcWhuUwi64X/NVaic42Ydfy8Rn0M4++hCXYELHG7mqmpNIUnbhflLG2WeuTA+By+2r1tiEu7z6BNKVW34pJDKhQlblNGpFPZhG7WL1RCZ2yvBXsnS0kiT2IjZ5ndjmfI1njWsnMimYTdfOX4oePADBv06e8Ie/WdrIXk9sUi11DufTbpMZnOg4SzJyEZ3PuqBnaOKL9dDtFmVHGE1jk2ISRz1I9V6JJ3wJTTz7414ynM/quTzxXuI3vc4NflPIdQeMTCxt8F6CXaYr6yOIp84+6jF1hyamHd5cN8tFVx6NTN6mUS3Z0btbrrHJ1/ULy+uyjUg7tI8AAAAASUVORK5CYII=';

/* ========== Navigation ========== */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

/* ========== Start ========== */
function startTest() {
  currentQ = 0;
  scores = {};
  isAnswering = false;
  ZONGZI.forEach(z => scores[z.id] = 0);
  selectedZongzi = null;
  renderQuestion();
  showScreen('question');
}

/* ========== Render Question ========== */
function renderQuestion() {
  const q = QUESTIONS[currentQ];
  document.getElementById('q-label').textContent = q.label;
  document.getElementById('q-title').textContent = q.title;

  // Progress dots
  const dots = QUESTIONS.map((_, i) => {
    let cls = 'dot';
    if (i < currentQ) cls += ' done';
    else if (i === currentQ) cls += ' current';
    return `<span class="${cls}"></span>`;
  }).join('');
  document.getElementById('q-progress').innerHTML = dots;

  // Options
  const optsHtml = q.options.map((opt, i) => `
    <div class="q-option" onclick="selectAnswer(${i})">
      <span class="opt-emoji">${opt.emoji}</span>
      <span class="opt-text">${opt.text}</span>
    </div>
  `).join('');
  document.getElementById('q-options').innerHTML = optsHtml;

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ========== Select Answer ========== */
function selectAnswer(idx) {
  if (isAnswering) return; // 防双击
  isAnswering = true;

  const q = QUESTIONS[currentQ];
  const opt = q.options[idx];

  // Visual feedback
  const optionEls = document.querySelectorAll('.q-option');
  optionEls.forEach(el => el.classList.remove('selected'));
  optionEls[idx].classList.add('selected');

  // Add scores
  Object.entries(opt.scores).forEach(([zid, pts]) => {
    scores[zid] = (scores[zid] || 0) + pts;
  });

  // Next question or show result
  setTimeout(() => {
    currentQ++;
    if (currentQ < QUESTIONS.length) {
      isAnswering = false;
      renderQuestion();
    } else {
      showResult();
    }
  }, 250);
}

/* ========== Show Result ========== */
function showResult() {
  // 二进制权重(1/2/4)保证总分组合唯一，数学上不存在平局
  let bestId = null;
  let bestScore = -1;
  Object.entries(scores).forEach(([zid, s]) => {
    if (s > bestScore) { bestScore = s; bestId = zid; }
  });

  selectedZongzi = ZONGZI.find(z => z.id === bestId);

  const z = selectedZongzi;
  const html = `
    <div class="result-banner">
      <span class="zongzi-emoji">${z.emoji}</span>
      <div class="zongzi-name">${z.name}</div>
      <div class="zongzi-tag">—— ${z.tag} ——</div>
    </div>
    <div class="result-body">
      <p class="result-desc">${z.desc}</p>
      <p class="result-detail">${z.detail}</p>
      <button class="btn-share" onclick="shareResult()">📤 生成分享图</button>
    </div>
  `;
  document.getElementById('result-card').innerHTML = html;
  showScreen('result');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ========== Restart ========== */
function restartTest() {
  startTest();
}

/* ========== Share Image ========== */
function shareResult() {
  const z = selectedZongzi;
  if (!z) return;

  // If QR not loaded yet, wait briefly
  if (!qrImage.complete) {
    const checkQR = setInterval(() => {
      if (qrImage.complete) { clearInterval(checkQR); doShare(); }
    }, 100);
    setTimeout(() => clearInterval(checkQR), 3000); // timeout
    return;
  }
  doShare();

  function doShare() {

  const canvas = document.createElement('canvas');
  const W = 600;
  const H = 960;
  const SCALE = 2; // 2x分辨率，手机上看不糊
  canvas.width = W * SCALE;
  canvas.height = H * SCALE;
  const ctx = canvas.getContext('2d');
  ctx.scale(SCALE, SCALE);

  // Background — rice paper texture
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#faf7f0');
  bgGrad.addColorStop(0.5, '#fdfbf7');
  bgGrad.addColorStop(1, '#f5f0e5');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Decorative top banners
  // Top green bar
  const topGrad = ctx.createLinearGradient(0, 0, W, 0);
  topGrad.addColorStop(0, '#4a7c59');
  topGrad.addColorStop(0.5, '#5a8f6a');
  topGrad.addColorStop(1, '#4a7c59');
  ctx.fillStyle = topGrad;
  ctx.fillRect(0, 0, W, 8);

  // Bottom accent line
  ctx.fillStyle = '#d4a853';
  ctx.fillRect(0, 8, W, 3);

  // Bamboo leaf decorations (simplified)
  function drawLeaf(x, y, angle, scale, color) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle * Math.PI / 180);
    ctx.scale(scale, scale);
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(20, -15, 60, -3);
    ctx.quadraticCurveTo(20, 8, 0, 0);
    ctx.fill();
    ctx.restore();
  }

  // Some decorative leaves in corners
  const leafGreen = 'rgba(74,124,89,0.15)';
  drawLeaf(50, 100, -30, 2.5, leafGreen);
  drawLeaf(560, 120, 160, 2, leafGreen);
  drawLeaf(40, 800, -20, 3, leafGreen);
  drawLeaf(550, 780, 150, 2.5, leafGreen);
  drawLeaf(80, 400, -45, 1.8, 'rgba(74,124,89,0.08)');
  drawLeaf(520, 500, 140, 1.5, 'rgba(74,124,89,0.08)');

  // Title area
  ctx.fillStyle = '#2d5a3a';
  ctx.font = 'bold 36px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('我是什么粽子？', W / 2, 85);

  // Subtitle
  ctx.fillStyle = '#8a7e6b';
  ctx.font = '18px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif';
  ctx.fillText('端午人格测试 · 3题揭晓', W / 2, 118);

  // Divider line with ornament
  ctx.strokeStyle = '#d4a853';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(150, 145);
  ctx.lineTo(450, 145);
  ctx.stroke();
  // Center diamond
  ctx.fillStyle = '#d4a853';
  ctx.beginPath();
  ctx.moveTo(W/2, 140);
  ctx.lineTo(W/2 + 6, 145);
  ctx.lineTo(W/2, 150);
  ctx.lineTo(W/2 - 6, 145);
  ctx.closePath();
  ctx.fill();

  // Zongzi emoji — large
  ctx.font = '120px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(z.emoji, W / 2, 270);

  // Zongzi name
  ctx.fillStyle = '#2d3436';
  ctx.font = 'bold 44px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif';
  ctx.fillText(z.name, W / 2, 330);

  // Tag
  ctx.fillStyle = '#fff';
  const tagW = ctx.measureText(z.tag).width + 40;
  const tagX = W / 2 - tagW / 2;
  const tagY = 350;
  // Tag bg pill
  ctx.fillStyle = '#4a7c59';
  ctx.beginPath();
  ctx.roundRect(tagX, tagY, tagW, 34, 17);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif';
  ctx.fillText(z.tag, W / 2, tagY + 25);

  // Description — wrapped text
  const descLines = z.desc.replace(/<br>/g, '\n').split('\n');
  ctx.fillStyle = '#2d3436';
  ctx.font = '22px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif';
  ctx.textAlign = 'center';
  descLines.forEach((line, i) => {
    ctx.fillText(line, W / 2, 440 + i * 36);
  });

  // Detail text — wrapped
  const detailY = 440 + descLines.length * 36 + 20;
  ctx.fillStyle = '#636e72';
  ctx.font = '16px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif';
  // Simple text wrapping
  const maxW = 480;
  const words = z.detail;
  let line = '';
  let lineY = detailY;
  for (let i = 0; i < words.length; i++) {
    const test = line + words[i];
    if (ctx.measureText(test).width > maxW && line.length > 0) {
      ctx.fillText(line, W / 2, lineY);
      line = words[i];
      lineY += 28;
    } else {
      line = test;
    }
  }
  if (line) ctx.fillText(line, W / 2, lineY);

  // Bottom CTA section
  const ctaY = lineY + 60;

  // Separator
  ctx.strokeStyle = '#e0d5c1';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(100, ctaY);
  ctx.lineTo(500, ctaY);
  ctx.stroke();

  // CTA text
  ctx.fillStyle = '#2d5a3a';
  ctx.font = 'bold 20px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif';
  ctx.fillText('你也来测测？扫码开始 👇', W / 2, ctaY + 35);

  // QR Code — real QR code preloaded on page init
  const qrX = W / 2 - 50;
  const qrY = ctaY + 50;
  const qrSize = 100;

  // Background behind QR
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.roundRect(qrX - 4, qrY - 4, qrSize + 8, qrSize + 8, 10);
  ctx.fill();

  // Draw real QR code (preloaded)
  ctx.drawImage(qrImage, qrX, qrY, qrSize, qrSize);

  // URL below QR
  ctx.fillStyle = '#8a7e6b';
  ctx.font = '14px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif';
  ctx.fillText('dzrsmj.github.io/zongzi-personality', W / 2, qrY + 125);

  // Bottom brand bar
  const brandY = H - 50;
  ctx.fillStyle = '#4a7c59';
  ctx.fillRect(0, brandY, W, 3);

  ctx.fillStyle = '#b0a99a';
  ctx.font = '13px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('🐲 扫码来测，看看你是什么粽子', 20, brandY - 12);
  ctx.textAlign = 'right';
  ctx.fillText('DT成长空间 · 出品', W - 20, brandY - 12);

    // Convert to image and show
    const dataUrl = canvas.toDataURL('image/png');
    const overlay = document.getElementById('overlay');
    const shareImg = document.getElementById('share-img');
    shareImg.src = dataUrl;
    overlay.classList.add('show');
  } // end doShare
}

function closeOverlay(e) {
  if (e && e.target !== document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.remove('show');
}

/* ========== Init ========== */
// Pre-render first screen
showScreen('start');

// Polyfill roundRect if needed
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
    this.beginPath();
    this.moveTo(x + r.tl, y);
    this.lineTo(x + w - r.tr, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r.tr);
    this.lineTo(x + w, y + h - r.br);
    this.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
    this.lineTo(x + r.bl, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r.bl);
    this.lineTo(x, y + r.tl);
    this.quadraticCurveTo(x, y, x + r.tl, y);
    this.closePath();
  };
}
